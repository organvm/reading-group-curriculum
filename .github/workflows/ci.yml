name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"
      - run: pip install "koinonia-db @ git+https://github.com/organvm-vi-koinonia/koinonia-db.git" || echo "::warning::koinonia-db dependency install failed"
      - run: pip install -e ".[dev]" || pip install -e .
      - name: Type check with pyright
        run: |
          pip install pyright
          pyright src/
      - run: python -m pytest tests/ -v || echo "::warning::pytest failed"
      - run: python -m ruff check src/ || echo "::warning::ruff check failed"
